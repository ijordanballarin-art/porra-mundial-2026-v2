<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Porra Mundial 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap');

  :root {
    --font-display: 'Bebas Neue', sans-serif;
    --bg: #0a0e1a;
    --bg2: #111827;
    --bg3: #1a2235;
    --border: #1e2d45;
    --gold: #f5c518;
    --gold2: #e6b800;
    --green: #22c55e;
    --red: #ef4444;
    --blue: #3b82f6;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --exact: #f5c518;
    --winner: #22c55e;
    --wrong: #ef4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #0a0e1a 0%, #0d1f3c 100%);
    border-bottom: 2px solid var(--gold);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--gold);
    line-height: 1;
  }
  .header-sub {
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .header-trophy { font-size: 32px; }

  /* NAV */
  .nav {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 4px;
    padding: 8px 16px;
    overflow-x: auto;
  }
  .nav-btn {
    background: none;
    border: 1px solid transparent;
    color: var(--text2);
    padding: 6px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    transition: all 0.15s;
    font-family: 'Inter', sans-serif;
  }
  .nav-btn:hover { border-color: var(--border); color: var(--text); }
  .nav-btn.active { background: var(--gold); color: #000; border-color: var(--gold); }

  /* MAIN */
  .main { padding: 16px; max-width: 1400px; margin: 0 auto; }

  /* RANKING */
  .ranking-table { width: 100%; border-collapse: collapse; }
  .ranking-table th {
    text-align: left; padding: 10px 12px;
    background: var(--bg3); color: var(--text3);
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    border-bottom: 1px solid var(--border);
  }
  .ranking-table td { padding: 12px; border-bottom: 1px solid var(--border); }
  .ranking-table tr:hover td { background: var(--bg3); }
  .rank-pos {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--text3);
    width: 40px;
  }
  .rank-pos.p1 { color: var(--gold); }
  .rank-pos.p2 { color: #94a3b8; }
  .rank-pos.p3 { color: #cd7f32; }
  .rank-name { font-weight: 600; font-size: 15px; }
  .rank-pts {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    color: var(--gold);
    text-align: right;
  }
  .rank-breakdown { font-size: 11px; color: var(--text3); }
  .pts-bar-wrap { width: 120px; }
  .pts-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .pts-bar-fill { height: 100%; background: var(--gold); border-radius: 3px; transition: width 0.5s; }

  /* PARTIDOS */
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--gold);
    letter-spacing: 3px;
    margin: 24px 0 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .day-group { margin-bottom: 20px; }
  .day-header {
    background: linear-gradient(90deg, #1a2235 0%, #111827 100%);
    border: 1px solid var(--border);
    border-radius: 10px 10px 0 0;
    padding: 10px 20px;
    font-weight: 700;
    color: var(--gold);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .day-header::before {
    content: '';
    display: inline-block;
    width: 3px; height: 14px;
    background: var(--gold);
    border-radius: 2px;
  }

  /* MATCH CARD — two-row layout */
  .match-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-top: none;
    transition: background 0.15s;
  }
  .match-card:hover { background: #141e30; }
  .match-card:last-child { border-radius: 0 0 10px 10px; }

  /* Top row: meta line + teams+score row */
  .mc-top {
    display: flex;
    flex-direction: column;
    padding: 14px 20px 10px;
    gap: 8px;
  }
  .mc-meta { text-align: left; }
  .match-id {
    font-size: 10px; color: var(--gold); font-weight: 700;
    letter-spacing: 1px;
  }
  .match-time { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .match-group { font-size: 10px; color: var(--text3); margin-top: 1px; }

  .team-name {
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 0.3px;
  }
  .team-home { text-align: right; }
  .team-away { text-align: left; }

  .score-area { text-align: center; }
  .score-saved {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px;
    color: #fff;
    letter-spacing: 3px;
    background: var(--bg3);
    border-radius: 8px;
    padding: 4px 14px;
    display: inline-block;
    border: 1px solid var(--border);
  }
  .score-pending {
    font-size: 18px;
    color: var(--text3);
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 3px;
  }

  /* Bottom row: predictions strip */
  .mc-preds {
    display: flex;
    gap: 6px;
    padding: 0 20px 12px;
    flex-wrap: wrap;
  }
  .pred-chip {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    border: 1px solid transparent;
    transition: transform 0.1s;
  }
  .pred-chip:hover { transform: translateY(-1px); }
  .pred-chip.exact {
    background: rgba(245,197,24,0.15);
    border-color: rgba(245,197,24,0.4);
    color: var(--gold);
  }
  .pred-chip.winner {
    background: rgba(34,197,94,0.1);
    border-color: rgba(34,197,94,0.3);
    color: var(--green);
  }
  .pred-chip.wrong {
    background: rgba(255,255,255,0.03);
    border-color: var(--border);
    color: var(--text3);
  }
  .pred-chip.pending {
    background: rgba(255,255,255,0.03);
    border-color: var(--border);
    color: var(--text3);
  }
  .pred-chip-name { opacity: 0.75; font-weight: 500; }
  .pred-chip-score { font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 1px; }
  .pred-chip-icon { font-size: 12px; line-height: 1; }
  .pred-chip-pts {
    font-size: 9px;
    font-weight: 800;
    padding: 1px 4px;
    border-radius: 3px;
    letter-spacing: 0.5px;
  }
  .pred-chip.exact .pred-chip-pts { background: var(--gold); color: #000; }
  .pred-chip.winner .pred-chip-pts { background: var(--green); color: #000; }
  .pred-chip.wrong .pred-chip-pts { background: var(--red); color: #fff; }

  /* PARTICIPANTE VIEW */
  .participant-selector {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px;
  }
  .part-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
    font-family: 'Inter', sans-serif;
  }
  .part-btn:hover { border-color: var(--gold); color: var(--text); }
  .part-btn.active { background: var(--gold); color: #000; border-color: var(--gold); }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    text-align: center;
  }
  .stat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    color: var(--gold);
    line-height: 1;
  }
  .stat-label { font-size: 11px; color: var(--text3); margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }

  /* GROUP VIEW */
  .groups-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }
  .group-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .group-header {
    background: var(--bg3);
    padding: 10px 14px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    color: var(--gold);
    letter-spacing: 2px;
    border-bottom: 1px solid var(--border);
  }
  .group-match {
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    display: grid;
    grid-template-columns: 30px 1fr auto 1fr auto;
    align-items: center;
    gap: 6px;
    font-size: 12px;
  }
  .group-match:last-child { border-bottom: none; }
  .gm-id { color: var(--text3); font-size: 10px; font-weight: 600; }
  .gm-home { text-align: right; font-weight: 500; }
  .gm-away { text-align: left; font-weight: 500; }
  .gm-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 1px;
    text-align: center;
    min-width: 50px;
    color: var(--text);
  }
  .gm-score.pending { color: var(--text3); font-size: 13px; font-family: 'Inter', sans-serif; }

  /* ELIM VIEW */
  .elim-section { margin-bottom: 28px; }
  .elim-table { width: 100%; border-collapse: collapse; }
  .elim-table th {
    padding: 8px 12px;
    background: var(--bg3);
    color: var(--text3);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    border-bottom: 1px solid var(--border);
    text-align: left;
  }
  .elim-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 12px; }
  .elim-table tr:hover td { background: rgba(255,255,255,0.02); }
  .match-teams { font-weight: 500; }
  .pred-cell { font-family: monospace; font-size: 12px; }
  .pred-cell.exact { color: var(--gold); font-weight: 700; }
  .pred-cell.winner { color: var(--green); }
  .pred-cell.wrong { color: var(--red); opacity: 0.7; }
  .pred-cell.pending { color: var(--text3); }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--green);
    color: #000;
    padding: 10px 18px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 13px;
    z-index: 999;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.2s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  .badge {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .badge-exact { background: rgba(245,197,24,0.2); color: var(--gold); }
  .badge-winner { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge-wrong { background: rgba(239,68,68,0.12); color: var(--red); }

  .hidden { display: none; }

  /* ===================== MOBILE ===================== */
  @media (max-width: 768px) {

    /* Header compacto */
    .header { padding: 10px 14px; gap: 10px; }
    .header-trophy { font-size: 24px; }
    .header-title { font-size: 22px; }
    .header-sub { display: none; }
    #sync-badge { font-size: 10px; min-width: 100px; }

    /* Nav scrollable con tabs más pequeños */
    .nav { padding: 6px 10px; gap: 4px; }
    .nav-btn { padding: 6px 10px; font-size: 11px; }

    /* Main sin padding lateral exagerado */
    .main { padding: 10px 8px; }

    /* Ranking — ocultar barra de progreso en móvil */
    .pts-bar-wrap { display: none; }
    .ranking-table th, .ranking-table td { padding: 8px 6px; }
    .rank-name { font-size: 13px; }
    .rank-pts { font-size: 20px; }
    .rank-pos { font-size: 18px; }

    /* Match card — layout vertical en móvil */
    .mc-top {
      grid-template-columns: 1fr;
      padding: 10px 12px 6px;
      gap: 6px;
    }
    /* Reorder: meta arriba, luego equipos+score en fila */
    .mc-meta {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .match-id { font-size: 10px; }
    .match-time { font-size: 10px; }
    .match-group { font-size: 10px; }

    /* Fila de equipos + score en móvil */
    .mc-teams-row {
      display: grid !important;
      grid-template-columns: 1fr auto 1fr !important;
      align-items: center;
      gap: 6px;
      width: 100%;
    }
    .team-name { font-size: 13px; }
    .score-saved { font-size: 22px; padding: 3px 10px; letter-spacing: 2px; }
    .score-pending { font-size: 14px; }

    /* Chips más compactos */
    .mc-preds { padding: 6px 12px 10px; gap: 4px; }
    .pred-chip { padding: 3px 7px; font-size: 10px; gap: 3px; }
    .pred-chip-score { font-size: 11px; }
    .pred-chip-pts { font-size: 8px; padding: 1px 3px; }

    /* Stats grid 2 columnas en móvil */
    .stats-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
    .stat-val { font-size: 26px; }

    /* Groups grid 1 columna */
    .groups-grid { grid-template-columns: 1fr; }

    /* Elim table — scroll horizontal */
    .elim-section { overflow-x: auto; }
    .elim-table { min-width: 500px; }

    /* Por participante — tabla scrollable */
    .part-table-wrap { overflow-x: auto; }

    /* Participant buttons más pequeños */
    .part-btn { padding: 6px 10px; font-size: 12px; }

    /* Day header más compacto */
    .day-header { padding: 8px 12px; font-size: 10px; letter-spacing: 1px; }

    /* Section title más pequeño */
    .section-title { font-size: 18px; margin: 16px 0 10px; }
  }
</style>

// ===================== JSONP helper =====================
function fetchJSONP(url) {
  return new Promise(function(resolve, reject) {
    const cbName = 'porra_cb_' + Date.now();
    const script = document.createElement('script');
    const timeout = setTimeout(function() {
      cleanup();
      reject(new Error('JSONP timeout'));
    }, 8000);
    function cleanup() {
      clearTimeout(timeout);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }
    window[cbName] = function(data) {
      cleanup();
      resolve(data);
    };
    script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cbName;
    script.onerror = function() { cleanup(); reject(new Error('JSONP load error')); };
    document.head.appendChild(script);
  });
}

// ===================== SHEETS FETCH =====================
async function fetchSheetResults() {
  if (isSyncing) return;
  isSyncing = true;
  updateSyncBadge('syncing');

  // 1) Try Apps Script via JSONP (bypasses CORS completely)
  if (APPS_SCRIPT_URL) {
    try {
      const data = await fetchJSONP(APPS_SCRIPT_URL);
      if (data && typeof data === 'object' && !data.error) {
        const local = JSON.parse(localStorage.getItem('porra_results') || '{}');
        Object.assign(local, data);
        localStorage.setItem('porra_results', JSON.stringify(local));
        lastSyncTime = new Date();
        updateSyncBadge('ok');
        refreshActiveView();
        isSyncing = false;
        return;
      }
    } catch (e) {
      console.warn('Apps Script JSONP failed:', e.message);
    }
  }

  // 2) Try CORS proxies to fetch the CSV directly
  const proxies = [
    csv => `https://corsproxy.io/?${encodeURIComponent(csv)}`,
    csv => `https://api.allorigins.win/raw?url=${encodeURIComponent(csv)}`,
  ];

  for (const makeUrl of proxies) {
    try {
      const url = makeUrl(SHEETS_CSV_URL);
      const resp = await fetch(url, { cache: 'no-store' });
      if (resp.ok) {
        const csv = await resp.text();
        if (csv && csv.length > 10 && csv.includes(',')) {
          processCSV(csv);
          lastSyncTime = new Date();
          updateSyncBadge('ok');
          isSyncing = false;
          return;
        }
      }
    } catch (e) {
      console.warn('Proxy fetch failed:', e.message);
    }
  }

  // 3) No live sync available — show embedded data
  lastSyncTime = new Date();
  updateSyncBadge('embedded');
  isSyncing = false;
}

async function fetchLisiPredictions() {
  if (!APPS_SCRIPT_URL) return;
  try {
    const resp = await fetch(APPS_SCRIPT_URL + '?sheet=LISI', { cache: 'no-store' });
    if (!resp.ok) return;
    const data = await resp.json();
    if (data && typeof data === 'object') {
      Object.keys(data).forEach(function(mid) {
        if (PREDICTIONS['Lisi'] !== undefined && mid in PREDICTIONS['Lisi']) {
          var val = data[mid];
          if (val && val.home !== undefined && val.away !== undefined) {
            PREDICTIONS['Lisi'][mid] = val.home + '-' + val.away;
          }
        }
      });
      refreshActiveView();
    }
  } catch(e) {
    console.warn('Lisi predictions fetch failed:', e.message);
  }
}

function processCSV(csv) {
  const lines = csv.trim().split('\n');
  if (lines.length < 2) return;
  // Skip header row, parse data rows
  const results = getResults();
  let changed = false;
  for (let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(',').map(c => c.trim().replace(/"/g, ''));
    if (cols.length < 3) continue;
    const matchId = cols[0];
    const home = parseInt(cols[1]);
    const away = parseInt(cols[2]);
    if (!matchId || matchId === '' || isNaN(home) || isNaN(away)) continue;
    if (!results[matchId] || results[matchId].home !== home || results[matchId].away !== away) {
      results[matchId] = { home, away };
      changed = true;
    }
  }
  if (changed) {
    localStorage.setItem('porra_results', JSON.stringify(results));
    refreshActiveView();
  }
}

function refreshActiveView() {
  const views = ['ranking','partidos','grupos','eliminatorias','participante'];
  views.forEach(function(v) {
    if (!document.getElementById('view-'+v).classList.contains('hidden')) {
      if (v === 'ranking') renderRanking();
      else if (v === 'partidos') renderPartidos();

}

function updateSyncBadge(state) {
  const badge = document.getElementById('sync-badge');
  if (!badge) return;
  if (state === 'syncing') {

  }
}

// SCORING
function getWinner(h, a) {
  if (h > a) return 'home';
  if (a > h) return 'away';
  return 'draw';
}
function parseScore(s) {
  if (!s) return null;
  // Handle prolo: "2P-1", "1-1P", "2(Pró)-1"
  const clean = s.replace(/\(Pró\)/g,'P').replace(/P/g,'');
  const parts = clean.split('-');
  if (parts.length !== 2) return null;
  return [parseInt(parts[0]), parseInt(parts[1])];
}
function calcPoints(pred, real) {
  if (!real) return {pts: 0, status: 'pending'};
  const p = parseScore(pred);
  const r = parseScore(real);
  if (!p || !r) return {pts: 0, status: 'pending'};
  if (p[0] === r[0] && p[1] === r[1]) return {pts: 3, status: 'exact'};
  if (getWinner(p[0],p[1]) === getWinner(r[0],r[1])) return {pts: 1, status: 'winner'};
  return {pts: 0, status: 'wrong'};
}
function calcAllPoints(participant) {
  const results = getResults();
  let total = 0, exact = 0, winner = 0;
  const matches = MATCHES.filter(function(m) { return m.id.startsWith('M'); });
  matches.forEach(m => {
    const pred = PREDICTIONS[participant][m.id];
    const real = results[m.id] ? `${results[m.id].home}-${results[m.id].away}` : null;
    const {pts, status} = calcPoints(pred, real);
    total += pts;
    if (status === 'exact') exact++;
    else if (status === 'winner') winner++;
  });
  return {total, exact, winner};
}

function getActiveDate() {
  const results = getResults();
  const byDate = {};
  MATCHES.forEach(function(m) {
    if (!byDate[m.date]) byDate[m.date] = [];
    byDate[m.date].push(m);
  });
  var sortedDates = Object.keys(byDate).sort();
  // First date with any unplayed match
  for (var i = 0; i < sortedDates.length; i++) {
    var dd = sortedDates[i];
    var hasUnplayed = byDate[dd].some(function(m) { return !results[m.id]; });
    if (hasUnplayed) return dd;
  }
  // Fallback: last date with played matches
  for (var j = sortedDates.length - 1; j >= 0; j--) {
    var dd2 = sortedDates[j];
    var hasPlayed = byDate[dd2].some(function(m) { return !!results[m.id]; });
    if (hasPlayed) return dd2;
  }
  return sortedDates[0] || null;
}

        const ptsTag = (rStr && pred) ? ' <span style="font-size:10px">(' + calc.pts + 'p)</span>' : '';
        return '<td class="pred-cell ' + calc.status + '">' + teamLabel + label + ptsTag + '</td>';
      }).join('');

      html += '<tr>'
        + '<td style="color:var(--text3);font-size:11px">' + m.id + '</td>'
        + '<td class="match-teams">' + matchLabel + '</td>'
        + realCell
        + predCells
        + '</tr>';
    });

    html += '</tbody></table></div>';
  });

  el.innerHTML = html;
}

let currentParticipant = 'Iñaki';
function renderParticipante(p) {
  if (p) currentParticipant = p;
  const el = document.getElementById('view-participante');
  const results = getResults();
  const s = calcAllPoints(currentParticipant);

  const phaseLabel = {
    'A':'Gr. A','B':'Gr. B','C':'Gr. C','D':'Gr. D',
    'E':'Gr. E','F':'Gr. F','G':'Gr. G','H':'Gr. H',
    'I':'Gr. I','J':'Gr. J','K':'Gr. K','L':'Gr. L',
    '16avos':'1/16','Octavos':'Octavos','Cuartos':'Cuartos',
    'Semifinales':'Semis','Tercer puesto':'3er Puesto','Final':'FINAL'
  };

  let html = '<div class="section-title">👤 Por Participante</div>';

  // Participant selector
  html += '<div class="participant-selector">';
  PARTICIPANTS.forEach(function(name) {
    const activeClass = name === currentParticipant ? 'active' : '';
    html += '<button class="part-btn ' + activeClass + '" onclick="renderParticipante(\'' + name + '\')">' + name + '</button>';
  });
  html += '</div>';

  // Stats cards
  html += '<div class="stats-grid">'
    + '<div class="stat-card"><div class="stat-val">' + s.total + '</div><div class="stat-label">Puntos</div></div>'
    + '<div class="stat-card"><div class="stat-val" style="color:var(--gold)">⭐ ' + s.exact + '</div><div class="stat-label">Exactos</div></div>'
    + '<div class="stat-card"><div class="stat-val" style="color:var(--green)">✅ ' + s.winner + '</div><div class="stat-label">Ganador</div></div>'
    + '<div class="stat-card"><div class="stat-val" style="color:var(--text3)">' + Object.keys(results).length + '</div><div class="stat-label">Jugados</div></div>'
    + '</div>';

  // Matches chronologically
  const byDate = {};
  MATCHES.forEach(function(m) {
    if (!byDate[m.date]) byDate[m.date] = [];
    byDate[m.date].push(m);
  });

  Object.keys(byDate).sort().forEach(function(date) {
    const d = new Date(date + 'T12:00:00');
    const dayStr = d.toLocaleDateString('es-ES', {weekday:'long', day:'numeric', month:'long'});
    html += '<div class="day-group"><div class="day-header">' + dayStr + '</div>';

    byDate[date].forEach(function(m) {
      const pred = PREDICTIONS[currentParticipant][m.id];
      const r = results[m.id];
      const rStr = r ? (r.home + '-' + r.away) : null;
      const calc = calcPoints(pred, rStr);

      var icon = '';
      if (rStr && pred) {
        if (calc.status === 'exact') icon = '⭐';
        else if (calc.status === 'winner') icon = '✅';
        else icon = '❌';
      }

      var statusColor = calc.status === 'exact' ? 'var(--gold)'
        : calc.status === 'winner' ? 'var(--green)'
        : calc.status === 'wrong' ? 'var(--red)'
        : 'var(--text3)';

      var ptsStr = (rStr && pred) ? calc.pts + ' pts' : '—';
      var phaseTxt = phaseLabel[m.group] || m.group;

      html += '<div style="display:flex;align-items:center;gap:10px;'
        + 'padding:10px 14px;border:1px solid var(--border);border-top:none;'
        + 'background:var(--bg2);flex-wrap:wrap;">'

        // Left: match info
        + '<div style="min-width:90px;flex:2">'
        +   '<div style="font-weight:600;font-size:13px">' + m.home + ' vs ' + m.away + '</div>'
        +   '<div style="font-size:10px;color:var(--text3);margin-top:2px">' + m.id + ' · ' + m.time + 'h · ' + phaseTxt + '</div>'
        + '</div>'

        // Center: real result
        + '<div style="min-width:50px;text-align:center">'
        +   '<div style="font-size:10px;color:var(--text3);margin-bottom:2px">Real</div>'
        +   '<div style="font-size:16px;font-weight:700">' + (rStr || '<span style="color:var(--text3)">—</span>') + '</div>'
        + '</div>'

        // Right: prediction + icon + pts
        + '<div style="min-width:70px;text-align:center">'
        +   '<div style="font-size:10px;color:var(--text3);margin-bottom:2px">Mi pred.</div>'
        +   '<div style="font-size:15px;font-weight:700;color:' + statusColor + '">'
        +     icon + ' ' + (pred || '—')
        +   '</div>'
        +   '<div style="font-size:11px;font-weight:700;color:' + statusColor + '">' + ptsStr + '</div>'
        + '</div>'

        + '</div>';
    });
    html += '</div>';
  });

  el.innerHTML = html;
}
function scrollToActive() {
  // Find the active date element and scroll to it
  var active = document.querySelector('.day-group [style*="color:#000"]');
  if (!active) active = document.querySelector('.day-group');
  if (active) {
    var card = active.closest('.day-group') || active.parentElement;
    card.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

// Init
renderRanking();
startAutoRefresh();
</script>
